name: "CodeQL"

on:
  push:
    branches: [ '*' ]
    paths: [ '**.go' ]
  pull_request:
    branches: [ '*' ]
  schedule:
    # run every Saturday at 00:00 UTC
    - cron: '0 0 * * 6'

jobs:
  Analyze:
    name: Analyze
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        # Learn more about CodeQL language support at https://git.io/codeql-language-support
        language: [ 'go' ]
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Initialize CodeQL
        uses: github/codeql-action/init@820e3160e279568db735cee8ed8f8e77a6da7818 # v3
        with:
          languages: ${{ matrix.language }}
          config-file: ./.github/codeql/codeql-config.yaml
      - name: Autobuild
        uses: github/codeql-action/autobuild@820e3160e279568db735cee8ed8f8e77a6da7818 # v3
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@820e3160e279568db735cee8ed8f8e77a6da7818 # v3
